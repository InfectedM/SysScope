<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SysScope</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/uplot.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Sys<span>Scope</span></h1>
    <p class="sub">Monitorização de spin-up dos discos</p>
  </header>

  <main>
    <section id="disks" class="panel">
      <h2>Discos</h2>
      <div id="disk-cards" class="cards"></div>
    </section>

    <section id="incidents" class="panel">
      <h2>Incidentes de spin-up</h2>
      <table id="incident-table">
        <thead><tr><th>Quando</th><th>Disco</th><th>Deteção</th><th>Culpado</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="services" class="panel">
      <h2>Serviços</h2>
      <div id="services-summary" class="io"></div>
      <table id="containers-table">
        <thead><tr><th>Container</th><th>CPU</th><th>Memória</th><th>Rede (R/T)</th><th>Disco (R/W)</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="network" class="panel">
      <h2>Rede</h2>
      <table id="net-table">
        <thead><tr><th>Interface</th><th>↓ RX</th><th>↑ TX</th></tr></thead>
        <tbody></tbody>
      </table>
      <h3 style="font-size:15px;margin:16px 0 8px;color:var(--muted)">Ligações ativas</h3>
      <table id="conn-table">
        <thead><tr><th>Proto</th><th>Estado</th><th>Local</th><th>Remoto</th><th>Processo</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/static/uplot.iife.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
